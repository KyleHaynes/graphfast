project:
  type: book
  output-dir: .
  execute-dir: project

execute:
  freeze: auto
  error: true
  warning: false
  message: false

book:
  title: "graphfast"
  subtitle: "Fast graph connectivity analysis and entity resolution in R, powered by C++"
  description: "Fast graph connectivity analysis and entity resolution in R, powered by C++."
  repo-url: https://github.com/KyleHaynes/graphfast
  repo-actions: [source, issue]
  sidebar:
    style: docked
    search: true
  chapters:
    - index.qmd
    - theory.qmd
    - examples.qmd
    - benchmarks.qmd
    - reference.qmd

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    df-print: kable
    highlight-style: github
